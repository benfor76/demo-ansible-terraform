---
- name: Execute Terraform Deployment via AAP
  hosts: localhost
  gather_facts: false
  vars:
    # Default fallback values (Best practice: override these via AAP Survey)
    aws_region: "us-east-2"
    vpc_name: "vpc-01f0d3e0669024ffd"
    subnet_name: "subnet-0fb7fc99427ad3efb"
    security_group_name: "sg-086080d0a5fb14422"
    key_name: "ben-lab-key-pair"
    instance_type: "t3.micro"
    tf_project_path: "{{ playbook_dir }}/terraform"

  tasks:
# --- SSA TROUBLESHOOTING STEP ---
    # This uses your AAP AWS credentials to discover what actually exists
    - name: Pre-Check AWS Visibility
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
      register: aws_vpc_facts

    - name: Report Discovered VPCs
      ansible.builtin.debug:
        msg: "AAP can see these VPC IDs in {{ aws_region }}: {{ aws_vpc_facts.vpcs | map(attribute='id') | list }}"

    # --- TERRAFORM EXECUTION ---
    - name: Run Terraform Init and Apply
      cloud.terraform.terraform:
        project_path: "{{ tf_project_path }}"
        state: present
        force_init: true
        variables:
          aws_region: "{{ aws_region }}"
          vpc_name: "{{ vpc_name }}"
          subnet_name: "{{ subnet_name }}"
          security_group_name: "{{ security_group_name }}"
          key_name: "{{ key_name }}"
          instance_type: "{{ instance_type }}"
      register: terraform_output

    - name: Display Elastic IP Infrastructure Details
      ansible.builtin.debug:
        msg: 
          - "SUCCESS: RHEL VM Provisioned with Elastic IP!"
          - "Elastic IP Address: {{ terraform_output.outputs.instance_elastic_ip.value }}"
          - "AWS Public DNS: {{ terraform_output.outputs.instance_public_dns.value }}"
